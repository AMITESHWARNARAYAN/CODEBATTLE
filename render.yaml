services:
  - type: web
    name: codebattle-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGODB_URI
        scope: run
      - key: JWT_SECRET
        scope: run
      - key: GROQ_API_KEY
        scope: run
      - key: GEMINI_API_KEY
        scope: run
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

